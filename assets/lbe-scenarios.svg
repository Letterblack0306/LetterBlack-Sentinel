<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">LBE practical scenarios</title>
  <desc id="desc">Four scenario cards showing AI coding assistant, command validation, scope proof, and audit review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#070A12"/><stop offset="1" stop-color="#0F172A"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#70F0C2"/><stop offset="1" stop-color="#8D7DFF"/></linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="60" y="60" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Where LBE fits</text>
  <text x="60" y="88" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="16">Practical workflows for local AI-agent governance.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(60 125)"><rect width="250" height="170" rx="22" fill="#10192B" stroke="#24314E"/><rect x="22" y="22" width="48" height="48" rx="14" fill="url(#accent)"/><path d="M36 47l10 10 22-28" fill="none" stroke="#071018" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="22" y="100" fill="#F3F7FF" font-size="20" font-weight="800">Coding assistant</text><text x="22" y="130" fill="#AEBAD5" font-size="14">Keep edits inside the</text><text x="22" y="152" fill="#AEBAD5" font-size="14">approved file scope.</text></g>
    <g transform="translate(335 125)"><rect width="250" height="170" rx="22" fill="#10192B" stroke="#24314E"/><rect x="22" y="22" width="48" height="48" rx="14" fill="url(#accent)"/><path d="M34 38h24M34 52h16" stroke="#071018" stroke-width="5" stroke-linecap="round"/><text x="22" y="100" fill="#F3F7FF" font-size="20" font-weight="800">Command validation</text><text x="22" y="130" fill="#AEBAD5" font-size="14">Ask LBE before the host</text><text x="22" y="152" fill="#AEBAD5" font-size="14">runs generated commands.</text></g>
    <g transform="translate(610 125)"><rect width="250" height="170" rx="22" fill="#10192B" stroke="#24314E"/><rect x="22" y="22" width="48" height="48" rx="14" fill="url(#accent)"/><path d="M46 31v30M31 46h30" stroke="#071018" stroke-width="5" stroke-linecap="round"/><text x="22" y="100" fill="#F3F7FF" font-size="20" font-weight="800">Scope proof</text><text x="22" y="130" fill="#AEBAD5" font-size="14">Verify final work against</text><text x="22" y="152" fill="#AEBAD5" font-size="14">the declared task.</text></g>
    <g transform="translate(885 125)"><rect width="250" height="170" rx="22" fill="#10192B" stroke="#24314E"/><rect x="22" y="22" width="48" height="48" rx="14" fill="url(#accent)"/><path d="M34 36h24M34 48h24M34 60h14" stroke="#071018" stroke-width="5" stroke-linecap="round"/><text x="22" y="100" fill="#F3F7FF" font-size="20" font-weight="800">Audit review</text><text x="22" y="130" fill="#AEBAD5" font-size="14">Review evidence before</text><text x="22" y="152" fill="#AEBAD5" font-size="14">accepting agent work.</text></g>
  </g>
</svg>
