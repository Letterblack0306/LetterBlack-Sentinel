<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">LBE simple workflow</title>
  <desc id="desc">Agent proposes, host asks LBE, LBE checks policy scope and proof, then host executes or blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#070A12"/><stop offset="1" stop-color="#0F172A"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#70F0C2"/><stop offset="1" stop-color="#8D7DFF"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#AEBAD5"/></marker>
  </defs>
  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <text x="60" y="58" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">From request to proof</text>
  <text x="60" y="86" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="16">A simple public view of the LBE workflow.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(60 130)"><rect width="170" height="100" rx="20" fill="#10192B" stroke="#24314E"/><circle cx="34" cy="34" r="16" fill="#70F0C2"/><text x="34" y="40" text-anchor="middle" fill="#071018" font-size="17" font-weight="800">1</text><text x="85" y="42" text-anchor="middle" fill="#F3F7FF" font-size="17" font-weight="700">Agent</text><text x="85" y="68" text-anchor="middle" fill="#AEBAD5" font-size="13">proposes action</text></g>
    <line x1="244" y1="180" x2="318" y2="180" stroke="#AEBAD5" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(330 130)"><rect width="170" height="100" rx="20" fill="#10192B" stroke="#24314E"/><circle cx="34" cy="34" r="16" fill="#70F0C2"/><text x="34" y="40" text-anchor="middle" fill="#071018" font-size="17" font-weight="800">2</text><text x="85" y="42" text-anchor="middle" fill="#F3F7FF" font-size="17" font-weight="700">Host</text><text x="85" y="68" text-anchor="middle" fill="#AEBAD5" font-size="13">asks LBE</text></g>
    <line x1="514" y1="180" x2="588" y2="180" stroke="#AEBAD5" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(600 130)"><rect width="170" height="100" rx="20" fill="#10192B" stroke="#24314E"/><circle cx="34" cy="34" r="16" fill="#8D7DFF"/><text x="34" y="40" text-anchor="middle" fill="#071018" font-size="17" font-weight="800">3</text><text x="85" y="42" text-anchor="middle" fill="#F3F7FF" font-size="17" font-weight="700">LBE</text><text x="85" y="68" text-anchor="middle" fill="#AEBAD5" font-size="13">checks scope</text></g>
    <line x1="784" y1="180" x2="858" y2="180" stroke="#AEBAD5" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(870 130)"><rect width="170" height="100" rx="20" fill="#10192B" stroke="#24314E"/><circle cx="34" cy="34" r="16" fill="#70F0C2"/><text x="34" y="40" text-anchor="middle" fill="#071018" font-size="17" font-weight="800">4</text><text x="85" y="42" text-anchor="middle" fill="#F3F7FF" font-size="17" font-weight="700">Decision</text><text x="85" y="68" text-anchor="middle" fill="#AEBAD5" font-size="13">allow / deny</text></g>
    <line x1="1054" y1="180" x2="1112" y2="180" stroke="#AEBAD5" stroke-width="4" marker-end="url(#arrow)"/>
    <circle cx="1140" cy="180" r="28" fill="url(#accent)"/><path d="M1128 180l8 8 17-18" fill="none" stroke="#071018" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
