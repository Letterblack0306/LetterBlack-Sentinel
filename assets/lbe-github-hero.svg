<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">LetterBlack LBE local execution boundary</title>
  <desc id="desc">A host application asks LBE for a local decision before executing an AI agent action.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#070A12"/><stop offset="1" stop-color="#0F172A"/></linearGradient>
    <linearGradient id="mintviolet" x1="0" x2="1"><stop offset="0" stop-color="#70F0C2"/><stop offset="1" stop-color="#8D7DFF"/></linearGradient>
    <linearGradient id="panel" x1="0" x2="1"><stop offset="0" stop-color="#10192B"/><stop offset="1" stop-color="#172033"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#AEBAD5"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="160" cy="40" r="180" fill="#70F0C2" opacity="0.08"/>
  <circle cx="1040" cy="60" r="210" fill="#8D7DFF" opacity="0.10"/>
  <text x="70" y="76" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">LetterBlack LBE</text>
  <text x="70" y="108" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="18">Local execution boundary for AI-agent workflows</text>
  <g filter="url(#shadow)"><rect x="76" y="170" width="250" height="145" rx="24" fill="url(#panel)" stroke="#24314E"/><text x="201" y="220" text-anchor="middle" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">AI agent</text><text x="201" y="250" text-anchor="middle" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="15">proposes a change</text><text x="201" y="278" text-anchor="middle" fill="#70F0C2" font-family="Inter, Arial, sans-serif" font-size="15">file · command · state</text></g>
  <line x1="342" y1="242" x2="450" y2="242" stroke="#AEBAD5" stroke-width="4" marker-end="url(#arrow)"/><text x="396" y="224" text-anchor="middle" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="14">host asks</text>
  <g filter="url(#shadow)"><rect x="470" y="142" width="260" height="200" rx="28" fill="#111B30" stroke="#3B4F78"/><rect x="494" y="166" width="212" height="42" rx="14" fill="url(#mintviolet)"/><text x="600" y="194" text-anchor="middle" fill="#071018" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">LBE boundary</text><text x="600" y="244" text-anchor="middle" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="16">policy</text><text x="600" y="274" text-anchor="middle" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="16">scope</text><text x="600" y="304" text-anchor="middle" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="16">proof status</text></g>
  <line x1="748" y1="242" x2="856" y2="242" stroke="#AEBAD5" stroke-width="4" marker-end="url(#arrow)"/><text x="802" y="224" text-anchor="middle" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="14">decision</text>
  <g filter="url(#shadow)"><rect x="876" y="170" width="250" height="145" rx="24" fill="url(#panel)" stroke="#24314E"/><text x="1001" y="220" text-anchor="middle" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Host application</text><text x="1001" y="250" text-anchor="middle" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="15">executes, blocks, or reports</text><text x="1001" y="278" text-anchor="middle" fill="#8D7DFF" font-family="Inter, Arial, sans-serif" font-size="15">local audit evidence</text></g>
</svg>
