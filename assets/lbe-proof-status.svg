<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Common LBE proof statuses</title>
  <desc id="desc">Six proof result tiles: clean, no scope found, no intent found, changed outside scope, validation missing, and proof incomplete.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#070A12"/><stop offset="1" stop-color="#0F172A"/></linearGradient>
    <linearGradient id="ok" x1="0" x2="1"><stop stop-color="#70F0C2"/><stop offset="1" stop-color="#8DF7B0"/></linearGradient>
    <linearGradient id="warn" x1="0" x2="1"><stop stop-color="#FFC86E"/><stop offset="1" stop-color="#8D7DFF"/></linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="60" y="58" fill="#F3F7FF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Readable proof results</text>
  <text x="60" y="86" fill="#AEBAD5" font-family="Inter, Arial, sans-serif" font-size="16">LBE reports status in terms humans can review.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(60 125)"><rect width="340" height="78" rx="18" fill="#10192B" stroke="#24314E"/><circle cx="38" cy="39" r="16" fill="url(#ok)"/><path d="M30 39l6 6 12-15" fill="none" stroke="#071018" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="70" y="35" fill="#F3F7FF" font-size="18" font-weight="800">CLEAN</text><text x="70" y="58" fill="#AEBAD5" font-size="14">Work matches the declared scope.</text></g>
    <g transform="translate(430 125)"><rect width="340" height="78" rx="18" fill="#10192B" stroke="#24314E"/><circle cx="38" cy="39" r="16" fill="url(#warn)"/><text x="38" y="45" text-anchor="middle" fill="#071018" font-size="18" font-weight="900">!</text><text x="70" y="35" fill="#F3F7FF" font-size="18" font-weight="800">NO_SCOPE_FOUND</text><text x="70" y="58" fill="#AEBAD5" font-size="14">No active scope was declared.</text></g>
    <g transform="translate(800 125)"><rect width="340" height="78" rx="18" fill="#10192B" stroke="#24314E"/><circle cx="38" cy="39" r="16" fill="url(#warn)"/><text x="38" y="45" text-anchor="middle" fill="#071018" font-size="18" font-weight="900">!</text><text x="70" y="35" fill="#F3F7FF" font-size="18" font-weight="800">NO_INTENT_FOUND</text><text x="70" y="58" fill="#AEBAD5" font-size="14">No task intent was registered.</text></g>
    <g transform="translate(60 225)"><rect width="340" height="78" rx="18" fill="#10192B" stroke="#24314E"/><circle cx="38" cy="39" r="16" fill="#FF8F9A"/><path d="M31 32l14 14M45 32L31 46" stroke="#071018" stroke-width="4" stroke-linecap="round"/><text x="70" y="35" fill="#F3F7FF" font-size="18" font-weight="800">CHANGED_OUTSIDE_SCOPE</text><text x="70" y="58" fill="#AEBAD5" font-size="14">Files changed outside the allowed scope.</text></g>
    <g transform="translate(430 225)"><rect width="340" height="78" rx="18" fill="#10192B" stroke="#24314E"/><circle cx="38" cy="39" r="16" fill="url(#warn)"/><text x="38" y="45" text-anchor="middle" fill="#071018" font-size="18" font-weight="900">!</text><text x="70" y="35" fill="#F3F7FF" font-size="18" font-weight="800">VALIDATION_MISSING</text><text x="70" y="58" fill="#AEBAD5" font-size="14">Required validation evidence is missing.</text></g>
    <g transform="translate(800 225)"><rect width="340" height="78" rx="18" fill="#10192B" stroke="#24314E"/><circle cx="38" cy="39" r="16" fill="url(#warn)"/><text x="38" y="45" text-anchor="middle" fill="#071018" font-size="18" font-weight="900">?</text><text x="70" y="35" fill="#F3F7FF" font-size="18" font-weight="800">PROOF_INCOMPLETE</text><text x="70" y="58" fill="#AEBAD5" font-size="14">Proof cannot be completed yet.</text></g>
  </g>
</svg>
